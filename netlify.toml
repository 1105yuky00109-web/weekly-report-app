# Netlifyビルド設定
[build]
  # publicフォルダをそのまま公開
  publish = "public"
  # ビルド時に環境変数をJSに注入するスクリプトを実行
  command = "node build-inject.js"

# 環境変数（Netlifyのダッシュボードで設定してください）
# FIREBASE_API_KEY
# FIREBASE_AUTH_DOMAIN
# FIREBASE_PROJECT_ID
# FIREBASE_STORAGE_BUCKET
# FIREBASE_MESSAGING_SENDER_ID
# FIREBASE_APP_ID
