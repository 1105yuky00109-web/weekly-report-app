<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>開発者専用 企業なりすまし管理画面 - 工事・日報管理システム</title>
    <link rel="stylesheet" href="style-v4.css?v=20260609-09">
    <style>
        body {
            font-family: 'Inter', 'Outfit', sans-serif;
            background-color: var(--bg-color, #f8fafc);
            color: var(--text-color, #1e293b);
            margin: 0;
            padding: 20px;
        }
        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--card-bg, #ffffff);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            padding: 30px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color, #e2e8f0);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 1.8rem;
            color: #10b981;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .company-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .company-card {
            border: 1px solid var(--border-color, #e2e8f0);
            border-radius: 8px;
            padding: 20px;
            background: var(--bg-color, #f8fafc);
            transition: all 0.2s;
        }
        .company-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        .company-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--primary-color, #2563eb);
        }
        .company-info {
            font-size: 0.9rem;
            color: var(--text-muted, #64748b);
            margin-bottom: 15px;
            line-height: 1.5;
        }
        .btn-impersonate {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: background-color 0.2s;
            width: 100%;
            justify-content: center;
        }
        .btn-impersonate:hover {
            background-color: #1d4ed8;
        }
        .back-link {
            text-decoration: none;
            color: #4b5563;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .back-link:hover {
            color: #111827;
        }
        #loading {
            text-align: center;
            font-size: 1.2rem;
            padding: 40px;
            color: var(--text-muted, #64748b);
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <header>
            <h1>🔧 開発者用なりすまし管理画面</h1>
            <a href="index.html" class="back-link">⬅️ システム画面へ戻る</a>
        </header>

        <div id="loading">企業データを読み込み中...</div>
        <div id="company-list" class="company-grid" style="display:none;"></div>
    </div>

    <!-- JS -->
    <script type="module" src="system-admin.js"></script>
</body>
</html>
