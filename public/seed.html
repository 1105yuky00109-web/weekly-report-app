<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>テストデータ自動投入</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f1f5f9; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; margin: 0 auto; text-align: center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; }
        .btn { display: inline-block; padding: 10px 20px; background: #2563eb; color: white; text-decoration: none; border-radius: 4px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>テストデータ投入中...</h2>
        <div id="loading" class="spinner"></div>
        <div id="status">クラウドデータベースへ通信しています...</div>
        <a href="/" id="back-btn" class="btn">アプリ画面へ戻る</a>
    </div>
    <script type="module" src="seed.js"></script>
</body>
</html>
