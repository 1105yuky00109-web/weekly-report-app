<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>図面作図業務 週次日報＆予定管理</title>
    <link rel="stylesheet" href="style.css?v=2">
    <!-- SheetJS for Excel Export -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <!-- ログイン画面 -->
    <div id="login-container" class="login-wrapper">
        <div class="login-card">
            <h2>システム ログイン</h2>
            <p>担当者のメールアドレスとパスワードを入力してください。</p>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">メールアドレス</label>
                    <input type="email" id="login-email" required placeholder="example@company.com">
                </div>
                <div class="form-group">
                    <label for="login-password">パスワード</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-large">ログイン</button>
                <div class="auth-toggle-link" style="margin-top: 15px; text-align: center;">
                    <a href="#" id="link-to-signup" style="color: var(--primary); text-decoration: none; font-size: 0.9rem; font-weight: bold;">新規アカウント作成はこちら</a>
                </div>
                <div id="login-error" class="message error hidden">ログインに失敗しました。</div>
            </form>
        </div>
    </div>

    <!-- 新規登録画面 -->
    <div id="signup-container" class="login-wrapper hidden">
        <div class="login-card">
            <h2>新規アカウント登録</h2>
            <p>担当者のメールアドレスとパスワードを入力してください。</p>
            <form id="signup-form">
                <div class="form-group">
                    <label for="signup-name">フルネーム（氏名）</label>
                    <input type="text" id="signup-name" required placeholder="例: 山田 太郎">
                </div>
                <div class="form-group">
                    <label for="signup-email">メールアドレス</label>
                    <input type="email" id="signup-email" required placeholder="example@company.com">
                </div>
                <div class="form-group">
                    <label for="signup-password">パスワード（6文字以上）</label>
                    <input type="password" id="signup-password" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary btn-large">アカウントを作成</button>
                <div class="auth-toggle-link" style="margin-top: 15px; text-align: center;">
                    <a href="#" id="link-to-login" style="color: var(--primary); text-decoration: none; font-size: 0.9rem; font-weight: bold;">ログイン画面へ戻る</a>
                </div>
                <div id="signup-error" class="message error hidden">登録に失敗しました。</div>
                <div id="signup-success" class="message success hidden">登録が完了しました！</div>
            </form>
        </div>
    </div>

    <!-- メインアプリ画面（ログイン後に表示） -->
    <div id="app-container" class="app-container hidden">
        <header class="no-print">
            <div class="header-top">
                <h1>週次日報 ＆ 予定管理システム</h1>
                <div class="user-info">
                    <span id="current-user-email"></span>
                    <button id="theme-toggle" class="btn btn-secondary btn-small" title="テーマ切り替え">🌓 テーマ切替</button>
                    <button id="btn-logout" class="btn btn-secondary btn-small">ログアウト</button>
                </div>
            </div>
            
            <nav class="tabs">
                <button class="tab-btn active" data-target="schedule-input-view">予定入力</button>
                <button class="tab-btn" data-target="gantt-view">月間予定チャート</button>
                <button class="tab-btn" data-target="input-view">日報入力（実績）</button>
                <button class="tab-btn" data-target="list-view">個人別一覧・レポート</button>
                <button class="tab-btn" data-target="summary-view">工事別集計</button>
            </nav>
        </header>

        <!-- 予定入力画面 -->
        <main id="schedule-input-view" class="view active no-print">
            <div class="form-card">
                <h2>予定を登録</h2>
                <form id="schedule-form">
                    <div class="form-group">
                        <label for="sched-project">工事名</label>
                        <input type="text" id="sched-project" placeholder="例: 〇〇ビル新築工事" required list="project-suggestions">
                    </div>
                    <!-- 担当者名はログインユーザーのメールから自動で表示するためreadonly -->
                    <div class="form-group">
                        <label for="sched-author">担当者（自動）</label>
                        <input type="text" id="sched-author" readonly>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="sched-start">開始日</label>
                            <input type="date" id="sched-start" required>
                        </div>
                        <div class="form-group">
                            <label for="sched-end">終了日</label>
                            <input type="date" id="sched-end" required>
                        </div>
                    </div>
                    <div class="date-shortcuts" style="margin-bottom: 20px; display: flex; gap: 8px; flex-wrap: wrap;">
                        <button type="button" class="btn btn-secondary btn-small btn-date-shortcut" data-target="sched-start" data-type="today">開始日を今日</button>
                        <button type="button" class="btn btn-secondary btn-small btn-date-shortcut" data-target="sched-start" data-type="tomorrow">開始日を明日</button>
                        <button type="button" class="btn btn-secondary btn-small btn-date-shortcut" data-target="sched-start" data-type="next-monday">開始日を来週月曜</button>
                    </div>
                    <div class="form-group">
                        <label for="sched-notes">作業内容・備考</label>
                        <input type="text" id="sched-notes" placeholder="主な作業内容など">
                    </div>
                    <button type="submit" class="btn btn-primary btn-large">予定を登録</button>
                    <div id="sched-submit-message" class="message hidden">予定を保存しました！</div>
                </form>
            </div>
        </main>

        <!-- 月間予定チャート（ガントチャート）画面 -->
        <main id="gantt-view" class="view">
            <div class="list-controls no-print">
                <div class="filters">
                    <input type="month" id="gantt-month">
                </div>
                <div class="actions">
                    <button id="btn-export-gantt" class="btn btn-success">Excel出力</button>
                    <button id="btn-print-gantt" class="btn btn-secondary">A3横 印刷</button>
                </div>
            </div>

            <div class="print-header only-print">
                <h2 id="print-gantt-title">月間作業予定表</h2>
            </div>

            <div class="table-container gantt-wrapper">
                <div class="gantt-container" id="gantt-container">
                    <!-- JSでガントチャートを描画します -->
                </div>
            </div>
        </main>

        <!-- 日報入力画面 -->
        <main id="input-view" class="view no-print">
            <div class="form-card">
                <h2>週次日報（実績）の作成 <span id="week-total-hours" style="font-size: 1.1rem; color: var(--primary); margin-left: 15px; font-weight: bold;">合計: 0.0H</span></h2>
                <form id="report-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="week">対象週</label>
                            <select id="week" required></select>
                            <div id="week-display-hint" style="font-size: 0.85rem; color: #64748b; margin-top: 5px;"></div>
                        </div>
                        <div class="form-group">
                            <label for="author">担当者（自動）</label>
                            <input type="text" id="author" readonly>
                        </div>
                    </div>

                    <div class="copy-past-section" style="background: #f1f5f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; border: 1px solid var(--border);">
                        <span style="font-size: 0.9rem; font-weight: bold; white-space: nowrap;">日報コピー:</span>
                        <select id="copy-past-report-select" style="flex: 1; padding: 8px; font-size: 0.9rem;"></select>
                        <button type="button" id="btn-copy-past-report" class="btn btn-secondary btn-small" style="padding: 8px 15px;">コピーする</button>
                    </div>

                    <div class="days-container" id="days-container"></div>



                    <button type="submit" id="btn-submit-report" class="btn btn-primary btn-large">登録</button>
                    <div id="submit-message" class="message hidden">登録が完了しました！</div>
                </form>
            </div>
        </main>

        <!-- 一覧画面（個人別・レポート表示用） -->
        <main id="list-view" class="view">
            <div class="list-controls no-print">
                <div class="filters">
                    <select id="filter-month"><option value="">すべての月</option></select>
                    <select id="filter-author"><option value="">すべての担当者</option></select>
                </div>
                <div class="actions">
                    <button id="btn-export" class="btn btn-success">Excel出力</button>
                    <button id="btn-print" class="btn btn-secondary">A4縦 印刷</button>
                </div>
            </div>

            <div class="print-header only-print">
                <h2>週次完了レポート（個人別）</h2>
            </div>

            <div class="table-container no-print">
                <table id="reports-table">
                    <thead>
                        <tr>
                            <th>対象期間</th>
                            <th>担当者</th>
                            <th>月</th>
                            <th>火</th>
                            <th>水</th>
                            <th>木</th>
                            <th>金</th>
                            <th>土</th>
                            <th>日</th>
                        </tr>
                    </thead>
                    <tbody id="reports-tbody"></tbody>
                </table>
            </div>
            
            <div id="print-details-container" class="only-print"></div>

            <!-- 【NEW】月間・個人別集計の表示エリア -->
            <div id="personal-summary-container" class="table-container" style="margin-top: 30px;"></div>
        </main>

        <!-- 工事別集計画面 -->
        <main id="summary-view" class="view">
            <div class="list-controls no-print">
                <div class="filters">
                    <span style="font-weight: bold; margin-right: 8px;">対象月:</span>
                    <select id="summary-filter-month">
                        <option value="">月を選択してください</option>
                    </select>
                </div>
                <div class="actions">
                    <button id="btn-export-summary" class="btn btn-success">Excel出力</button>
                    <button id="btn-print-summary" class="btn btn-secondary">A3横 印刷</button>
                </div>
            </div>

            <div class="print-header only-print">
                <h2 id="print-summary-title">工事別 作業時間集計</h2>
            </div>

            <div class="table-container" style="overflow-x: auto;">
                <table id="summary-table" style="min-width: 1200px; border-collapse: collapse;">
                    <thead id="summary-thead"></thead>
                    <tbody id="summary-tbody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- 作業行のテンプレート -->
    <template id="task-row-template">
        <div class="task-row timeline-task-row">
            <div class="task-row-top">
                <input type="text" class="task-project" placeholder="工事名" required list="project-suggestions" style="flex: 2;">
                <input type="text" class="task-detail" placeholder="作業内容" required style="flex: 3;">
                <button type="button" class="btn btn-danger btn-icon remove-task-btn" title="削除">×</button>
            </div>
            
            <div class="task-row-bottom">
                <!-- パレット（モード選択） -->
                <div class="timeline-palette">
                    <button type="button" class="palette-btn btn-work active" data-mode="1" title="作業時間(黒)で塗る">
                        <span class="color-dot" style="background:#000;"></span>作業
                    </button>
                    <button type="button" class="palette-btn btn-break" data-mode="2" title="休憩時間(赤)で塗る">
                        <span class="color-dot" style="background:#ef4444;"></span>休憩
                    </button>
                    <button type="button" class="palette-btn btn-clear" data-mode="0" title="消しゴム">
                        🗑️
                    </button>
                </div>
                
                <!-- タイムラインコンテナ -->
                <div class="timeline-container-scroll">
                    <div class="timeline-bar-wrapper">
                        <!-- 時間ヘッダー (0〜24時) -->
                        <div class="timeline-hours-header"></div>
                        <!-- セルグリッド (48セル) -->
                        <div class="timeline-cells-grid"></div>
                    </div>
                </div>
                
                <!-- 合計時間表示 -->
                <div class="timeline-summary">
                    <span class="timeline-hours-total">0.0</span>H
                    <input type="hidden" class="task-hours" value="0.0">
                    <input type="hidden" class="task-timeline-data" value="">
                </div>
            </div>
        </div>
    </template>

    <datalist id="project-suggestions"></datalist>
    <!-- モジュールとしてapp.jsを読み込む（Firebase v10対応のため） -->
    <script type="module" src="app.js?v=2"></script>
</body>
</html>
