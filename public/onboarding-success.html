<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ご契約完了 - 工事・日報管理システム</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --success: #10b981;
      --background: #f8fafc;
      --card-bg: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .success-card {
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--border);
      width: 100%;
      max-width: 500px;
      padding: 40px;
      text-align: center;
      transition: all 0.3s ease;
    }

    @media (max-width: 600px) {
      body {
        padding: 10px;
      }
      .success-card {
        padding: 30px 20px;
        border-radius: 12px;
      }
    }

    .icon-wrapper {
      width: 72px;
      height: 72px;
      background: #ecfdf5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      color: var(--success);
      animation: scaleUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .icon-wrapper svg {
      width: 38px;
      height: 38px;
      stroke-width: 2.5;
    }

    .header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 12px;
    }

    .message {
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .info-box {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 32px;
      text-align: left;
      font-size: 0.85rem;
    }

    .info-box p {
      margin-bottom: 8px;
      color: #475569;
    }

    .info-box p:last-child {
      margin-bottom: 0;
    }

    .info-box strong {
      color: var(--text);
    }

    .primary-btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
      color: #ffffff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.15), 0 2px 4px -1px rgba(37, 99, 235, 0.1);
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .primary-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2), 0 4px 6px -2px rgba(37, 99, 235, 0.15);
    }

    .primary-btn:active {
      transform: translateY(1px);
    }

    @keyframes scaleUp {
      0% {
        transform: scale(0.8);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <main class="success-card">
    <div class="icon-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
      </svg>
    </div>

    <div class="header">
      <h1>ご契約ありがとうございます！</h1>
    </div>

    <p class="message">
      お支払いが完了しました。<br>
      会社アカウントおよび管理者ユーザーのセットアップが完了いたしました。
    </p>

    <div class="info-box">
      <p>※ 登録された管理者メールアドレス宛てに、<strong>アカウント登録完了メール</strong>をお送りしましたのでご確認ください。</p>
      <p>※ ログインには、オンボーディング画面でご自身で設定されたパスワードを使用します。</p>
    </div>

    <a href="index.html" class="primary-btn">ログイン画面へ進む</a>
  </main>
</body>
</html>
